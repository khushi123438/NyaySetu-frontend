<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | NyayaSetu</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #4f46e5, #75f2f2);
  }

  .contact-container {
    background: #fff;
    padding: 50px 40px;
    border-radius: 25px;
    width: 380px;
    max-width: 95%;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    text-align: center;
    animation: fadeIn 0.8s ease forwards;
  }

  @keyframes fadeIn {
    0% {opacity:0; transform: translateY(-30px);}
    100% {opacity:1; transform: translateY(0);}
  }

  h2 {
    font-size: 30px;
    color: #4f46e5;
    margin-bottom: 35px;
    position: relative;
  }
  h2::after {
    content: '';
    display: block;
    width: 60px;
    height: 3px;
    background: #4f46e5;
    margin: 10px auto 0 auto;
    border-radius: 2px;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 25px;
  }

  .form-group {
    position: relative;
  }

  input, textarea {
    width: 91%;
    padding: 16px 18px;
    border-radius: 12px;
    border: 1px solid #ccc;
    font-size: 16px;
    outline: none;
    transition: all 0.3s ease;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.05);
  }

  input:focus, textarea:focus {
    border-color: #4f46e5;
    box-shadow: 0 0 8px rgba(79,70,229,0.2);
  }

  textarea {
    height: 130px;
    resize: none;
  }

  label {
    position: absolute;
    top: 16px;
    left: 18px;
    font-size: 14px;
    color: #888;
    pointer-events: none;
    background: #fff;
    padding: 0 5px;
    transition: 0.3s ease;
  }

  input:focus + label,
  input:not(:placeholder-shown) + label,
  textarea:focus + label,
  textarea:not(:placeholder-shown) + label {
    top: -10px;
    font-size: 12px;
    color: #4f46e5;
  }

  button {
    background: linear-gradient(90deg,#4f46e5,#75f2f2);
    color: #fff;
    padding: 16px;
    border: none;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  button:hover {
    background: linear-gradient(90deg,#3730a3,#4f46e5);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  }

  .back-btn {
    margin-top: 15px;
    background: #fff;
    color: #4f46e5;
    padding: 10px 18px;
    border-radius: 12px;
    border: 1px solid #4f46e5;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
  }
  .back-btn:hover {
    background: #4f46e5;
    color: #fff;
  }

  /* TOAST NOTIFICATION */
  .toast {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    background: #4f46e5;
    color: #fff;
    padding: 14px 25px;
    border-radius: 12px;
    font-size: 15px;
    opacity: 0;
    pointer-events: none;
    transition: 0.5s ease;
    z-index: 1000;
  }
  .toast.show {
    opacity: 1;
    pointer-events: auto;
  }

  .toast.error {
    background: #ef4444;
  }
</style>
</head>
<body>

<div class="contact-container">
  <h2>Contact Us 📬</h2>
  <form id="contactForm">
    <div class="form-group">
      <input type="text" id="name" placeholder=" " required>
      <label for="name">Your Name</label>
    </div>
    <div class="form-group">
      <input type="email" id="email" placeholder=" " required>
      <label for="email">Email Address</label>
    </div>
    <div class="form-group">
      <textarea id="message" placeholder=" " required></textarea>
      <label for="message">Your Message</label>
    </div>
    <button type="submit">Send Message</button>
  </form>
  <button class="back-btn" onclick="goBack()">⬅ Back to Home</button>
</div>

<div id="toast" class="toast"></div>

<script>
const BASE_URL = "https://nyaysetu-backend-sme2.onrender.com";

function showToast(message, type="success"){
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.className = "toast show" + (type === "error" ? " error" : "");
    setTimeout(()=>{ toast.className = "toast"; }, 3000);
}

document.getElementById("contactForm").addEventListener("submit", async (e)=>{
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const message = document.getElementById("message").value.trim();

    if(!name || !email || !message){
        showToast("Please fill all fields!", "error");
        return;
    }

    const body = { name, email, message };

    try{
        const res = await fetch(`${BASE_URL}/api/contact`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
        });
        const data = await res.json();

        if(data.success){
            showToast("Message sent successfully! ✅");
            document.getElementById("contactForm").reset();
        } else {
            showToast("Failed to send message!", "error");
        }
    } catch(err){
        console.error(err);
        showToast("Something went wrong!", "error");
    }
});

function goBack(){
    window.location.href = "user.html"; // change to your home page path
}
</script>

</body>
</html>
