<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advocate Chat</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#e5ddd5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.main-container{
width:900px;
height:600px;
display:flex;
border-radius:12px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
border:1px solid #dcdcdc;
background:white;
}


.client-list{
width:35%;
background:white;
border-right:1px solid #e0e0e0;
display:flex;
flex-direction:column;
overflow-y:scroll;
}

.client-header{
background:#128C7E;
color:white;
padding:15px;
font-weight:bold;
}

.client{
padding:12px 15px;
border-bottom:1px solid #f0f0f0;
cursor:pointer;
transition:0.2s;
}

.client:hover{
background:#f7f7f7;
}


.chat-container{
width:65%;
display:flex;
flex-direction:column;
background:white;
border-left:1px solid #e0e0e0;
}

.chat-header{
background:#128C7E;
color:white;
padding:15px;
font-size:18px;
font-weight:bold;
display:flex;
justify-content:space-between;
}

.chat-messages{
flex:1;
padding:10px;
background:#f0f0f0;
overflow-y:scroll;
display:flex;
flex-direction:column;
scrollbar-width:thin;
}


.client-list::-webkit-scrollbar,
.chat-messages::-webkit-scrollbar{
width:8px;
}

.client-list::-webkit-scrollbar-track,
.chat-messages::-webkit-scrollbar-track{
background:#f1f1f1;
}

.client-list::-webkit-scrollbar-thumb,
.chat-messages::-webkit-scrollbar-thumb{
background:#bcbcbc;
border-radius:10px;
}

.client-list::-webkit-scrollbar-thumb:hover,
.chat-messages::-webkit-scrollbar-thumb:hover{
background:#888;
}

.message{
padding:8px 12px;
margin:6px 0;
max-width:70%;
border-radius:12px;
word-wrap:break-word;
position:relative;
}

.message.user{
background:#dcf8c6;
align-self:flex-end;
border-bottom-right-radius:3px;
}

.message.advocate{
background:white;
align-self:flex-start;
border-bottom-left-radius:3px;
}

.timestamp{
font-size:10px;
color:gray;
margin-top:2px;
}

.message:hover .delete-btn{
display:block;
}

.delete-btn{
display:none;
position:absolute;
top:2px;
right:2px;
background:red;
color:white;
border:none;
border-radius:50%;
width:18px;
height:18px;
cursor:pointer;
font-size:12px;
}

.menu-container{
position:relative;
cursor:pointer;
}

.menu-btn{
font-size:18px;
padding:5px;
}

.menu-dropdown{
display:none;
position:absolute;
right:0;
top:20px;
background:white;
border:1px solid #ddd;
border-radius:6px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
z-index:10;
}

.menu-dropdown div{
padding:8px 12px;
cursor:pointer;
}

.menu-dropdown div:hover{
background:#f5f5f5;
}

.menu-container.active .menu-dropdown{
display:block;
}


.chat-input{
display:flex;
padding:10px;
background:#eee;
gap:5px;
align-items:center;
}

.chat-input input[type=text]{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

.chat-input input[type=file]{
display:none;
}

.chat-input button{
min-width:50px;
height:40px;
border-radius:50%;
background:#25D366;
color:white;
border:none;
cursor:pointer;
font-size:18px;
display:flex;
justify-content:center;
align-items:center;
}

.typing-indicator{
font-size:12px;
color:white;
}

</style>
</head>

<body>

<div class="main-container">

<div class="client-list">

<div class="client-header" id="clientHeader">
Loading...
</div>

<div id="clientList"></div>

</div>



<div class="chat-container">

<div class="chat-header">
<span id="chatUser">Select Client</span>
<span id="typingIndicator" class="typing-indicator"></span>
</div>

<div class="chat-messages" id="chatMessages"></div>
<div id="filePreview" style="padding:5px;"></div>

<div class="chat-input">
<input type="text" id="messageInput" placeholder="Type a message...">

<label for="fileInput" style="cursor:pointer;color:#128C7E;font-size:20px;">📎</label>
<input type="file" id="fileInput">

<button type="button" id="sendBtn">&#9658;</button>
</div>
</div>

</div>


<script>
const BASE_URL = "https://nyaysetu-backend-sme2.onrender.com/api/chat";

let currentBookingId = null;
const chatMessages = document.getElementById("chatMessages");
const messageInput = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");
const fileInput = document.getElementById("fileInput");
const filePreview = document.getElementById("filePreview");
const typingIndicator = document.getElementById("typingIndicator");

const token = localStorage.getItem("userToken");

let sender = localStorage.getItem('advocateId') || localStorage.getItem('userId');

if(!token || !sender){
alert("Session expired. Please login again.");
window.location.href="login.html";
}
let senderType = localStorage.getItem('advocateId') ? "Advocate" : "User";

const clientHeader = document.getElementById("clientHeader");

if(senderType === "Advocate"){
 clientHeader.innerText = "Approved Clients";
}
else{
 clientHeader.innerText = "Your Advocates";
}

if(!localStorage.getItem('advocateId') && !localStorage.getItem('userId')){
alert("Login required");
window.location.href="login.html";
}

fileInput.addEventListener("change", () => {

 const file = fileInput.files[0];
 if(!file) return;

 if(file.type.startsWith("image/")){

   const reader = new FileReader();

   reader.onload = function(e){
     filePreview.innerHTML =
     `<img src="${e.target.result}" width="120" style="border-radius:8px;">`;
   };

   reader.readAsDataURL(file);

 } else {

   filePreview.innerHTML =
   `<div style="background:white;padding:5px;border-radius:6px;">
   📄 ${file.name}
   </div>`;

 }

});

async function loadClients() {
    const list = document.getElementById("clientList");
    list.innerHTML = "";
    const addedClients = new Set();

    let approvedLocal = JSON.parse(localStorage.getItem("approvedClients")) || [];
    approvedLocal.forEach(client => {
        if (addedClients.has(client.bookingId)) return;
        addedClients.add(client.bookingId);

        const div = document.createElement("div");
        div.className = "client";
        div.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <span class="client-name">${client.name}</span>
                <div class="menu-container">
                    <span class="menu-btn">⋮</span>
                    <div class="menu-dropdown">
                        <div class="delete-chat">🗑</div>
                    </div>
                </div>
            </div>`;
        
        const menuBtn = div.querySelector(".menu-btn");
        const menu = div.querySelector(".menu-container");
        menuBtn.onclick = e => { e.stopPropagation(); menu.classList.toggle("active"); }
        div.querySelector(".delete-chat").onclick = e => { e.stopPropagation(); deleteFullChat(client.bookingId); }
        div.querySelector(".client-name").onclick = () => {
            currentBookingId = client.bookingId;
            document.getElementById("chatUser").innerText = client.name;
            loadMessages();
setTimeout(()=>{
 chatMessages.scrollTop = chatMessages.scrollHeight;
},200);
        }

        list.appendChild(div);
    });

    try {

let url = senderType === "Advocate"
    ? `${BASE_URL}/api/hire/approved/${sender}`
    : `${BASE_URL}/api/hire/user/${sender}`;

const token = localStorage.getItem('userToken');

const res = await fetch(url, {
    headers: { 'Authorization': `Bearer ${token}` }
});
        if (!res.ok) return; 
        const data = await res.json();
        if (!data.success || !data.bookings) return;

        data.bookings.forEach(b => {
            if (addedClients.has(b._id)) return;
            addedClients.add(b._id);

            const div = document.createElement("div");
            div.className = "client";
            div.innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <span class="client-name">${senderType === "Advocate" ? b.userName : b.advocateName}</span>
                    <div class="menu-container">
                        <span class="menu-btn">⋮</span>
                        <div class="menu-dropdown">
                            <div class="delete-chat">🗑</div>
                        </div>
                    </div>
                </div>`;

            const menuBtn = div.querySelector(".menu-btn");
            const menu = div.querySelector(".menu-container");
            menuBtn.onclick = e => { e.stopPropagation(); menu.classList.toggle("active"); }
            div.querySelector(".delete-chat").onclick = e => { e.stopPropagation(); deleteFullChat(b._id); }
            div.querySelector(".client-name").onclick = () => {
                currentBookingId = b._id;
                document.getElementById("chatUser").innerText = senderType === "Advocate" ? b.userName : b.advocateName;
               loadMessages();
setTimeout(()=>{
 chatMessages.scrollTop = chatMessages.scrollHeight;
},200);
            }

            list.appendChild(div);
        });

    } catch (err) {
        console.error("Backend client load error:", err);
    }
}

async function loadMessages() {
    if (!currentBookingId) return;

    try {
        const res = await fetch(`${BASE_URL}/chat/${currentBookingId}`,{
headers:{
'Authorization':`Bearer ${localStorage.getItem("userToken")}`
}
});
        if (!res.ok) return;
        const data = await res.json();
        chatMessages.innerHTML = "";

        if (!data.success || !Array.isArray(data.chats)) return;

       data.chats.forEach(msg => {

  if(!msg || !msg.sender) return;

  const div = document.createElement("div");
  div.classList.add("message");

  div.classList.add(
    msg.sender._id.toString() === sender.toString() ? "user" : "advocate"
  );

  let attachmentHTML = "";

  if(msg.attachments){

    const fileUrl = `${BASE_URL}${msg.attachments}`;

    if(msg.attachments.match(/\.(jpg|jpeg|png|gif)$/i)){
      attachmentHTML = `
      <br>
      <img src="${fileUrl}" 
      style="max-width:180px;border-radius:8px;margin-top:5px;cursor:pointer;"
      onclick="window.open('${fileUrl}')">
      `;
    }else{
      attachmentHTML = `
      <br>
      <a href="${fileUrl}" target="_blank" 
      style="display:inline-block;margin-top:5px;background:#f1f1f1;padding:6px 10px;border-radius:6px;text-decoration:none;color:black;">
      📎 Download File
      </a>
      `;
    }

  }

  div.innerHTML = `
  <strong>${msg.sender?.name || "Advocate"}</strong><br>
  ${msg.message || ""}
  ${attachmentHTML}

  <span class="timestamp">
  ${new Date(msg.createdAt).toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})}
  </span>

  <button class="delete-btn" onclick="deleteMessage('${msg._id}')">x</button>
  `;

  chatMessages.appendChild(div);

});

        chatMessages.scrollTop = chatMessages.scrollHeight;

    } catch (err) {
        console.error("Error loading messages:", err);
    }
}

async function sendMessage() {
  const token = localStorage.getItem('userToken');
  if (!currentBookingId) return alert("Select a client first.");

  const messageText = messageInput.value.trim();
  const file = fileInput.files[0];

  if (!messageText && !file) return alert("Type a message or attach a file.");

  // Build FormData for file upload
  const formData = new FormData();
  formData.append("bookingId", currentBookingId);
  formData.append("sender", sender);
  formData.append("senderType", senderType.toLowerCase());
  formData.append("message", messageText || ""); // empty string if no text
  if (file) formData.append("attachments", file);

  // Debug: see what’s being sent
  console.log("Sending payload:");
  for (let pair of formData.entries()) console.log(pair[0], pair[1]);

  try {
    const res = await fetch(`${BASE_URL}/chat/send`, {
      method: "POST",
      headers: { "Authorization": `Bearer ${token}` },
      body: formData // browser sets Content-Type automatically
    });

    const data = await res.json();

    if (res.ok && data.success) {
      messageInput.value = "";
      fileInput.value = "";
      filePreview.innerHTML = "";
      await loadMessages(); // reload chat
      setTimeout(() => chatMessages.scrollTop = chatMessages.scrollHeight, 200);
    } else {
      alert(data.message || "Failed to send message");
    }
  } catch (err) {
    console.error("Send message error:", err);
    alert("Server error while sending message");
  }
}

window.deleteMessage = async (id) => {
    try {
        await fetch(`${BASE_URL}/chat/delete/${id}`, {
  method: 'DELETE',
  headers:{
    'Authorization':`Bearer ${localStorage.getItem("userToken")}`
  }
});
        loadMessages();
    } catch (err) { console.error(err); }
}

async function deleteFullChat(bookingId) {
    if (!confirm("Delete this entire chat?")) return;

    try {
       await fetch(`${BASE_URL}/chat/delete-all/${bookingId}`, {
  method:"DELETE",
  headers:{
    'Authorization':`Bearer ${localStorage.getItem("userToken")}`
  }
});

        let approved = JSON.parse(localStorage.getItem("approvedClients")) || [];
        approved = approved.filter(c => c.bookingId !== bookingId);
        localStorage.setItem("approvedClients", JSON.stringify(approved));

        loadClients();
        chatMessages.innerHTML = "";
        document.getElementById("chatUser").innerText = "Select Client";

    } catch (err) {
        console.error("Delete full chat error", err);
    }
}

sendBtn.onclick = sendMessage;
messageInput.addEventListener("keydown", e => { if(e.key==="Enter"){e.preventDefault();sendMessage();}});
messageInput.addEventListener('input',()=>{
 typingIndicator.innerText='Typing...';
 setTimeout(()=>typingIndicator.innerText='',1000);
});

loadClients();
setInterval(()=>{
 if(currentBookingId){
   loadMessages();
 }
},3000);
</script>
</body> 
</html>
