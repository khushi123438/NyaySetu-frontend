<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advocate Chat</title>
<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#e5ddd5;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding:10px;
}

.main-container{
  display:flex;
  flex-direction:row;
  width:100%;
  max-width:1000px;
  height:90vh;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
  border:1px solid #dcdcdc;
  background:white;
}

/* Client List */
.client-list{
  width:35%;
  min-width:200px;
  max-width:300px;
  background:white;
  border-right:1px solid #e0e0e0;
  display:flex;
  flex-direction:column;
  overflow-y:auto;
}

.client-header{
  background:#128C7E;
  color:white;
  padding:15px;
  font-weight:bold;
}

.client{
  padding:12px 15px;
  border-bottom:1px solid #f0f0f0;
  cursor:pointer;
  transition:0.2s;
}

.client:hover{
  background:#f7f7f7;
}

/* Chat Container */
.chat-container{
  flex:1;
  display:flex;
  flex-direction:column;
  background:white;
}

.chat-header{
  background:#128C7E;
  color:white;
  padding:15px;
  font-size:18px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.chat-messages{
  flex:1;
  padding:10px;
  background:#f0f0f0;
  overflow-y:scroll;
  display:flex;
  flex-direction:column;
  scrollbar-width:thin;
}

.client-list::-webkit-scrollbar,
.chat-messages::-webkit-scrollbar{
  width:6px;
}

.client-list::-webkit-scrollbar-thumb,
.chat-messages::-webkit-scrollbar-thumb{
  background:#bcbcbc;
  border-radius:10px;
}

.message{
  padding:8px 12px;
  margin:6px 0;
  max-width:70%;
  border-radius:12px;
  word-wrap:break-word;
  position:relative;
}

.message.user{
  background:#dcf8c6;
  align-self:flex-end;
  border-bottom-right-radius:3px;
}

.message.advocate{
  background:white;
  align-self:flex-start;
  border-bottom-left-radius:3px;
}

.timestamp{
  font-size:10px;
  color:gray;
  margin-top:2px;
}

.delete-btn{
  display:none;
  position:absolute;
  top:2px;
  right:2px;
  background:red;
  color:white;
  border:none;
  border-radius:50%;
  width:18px;
  height:18px;
  cursor:pointer;
  font-size:12px;
}

.message:hover .delete-btn{
  display:block;
}

.chat-input{
  display:flex;
  padding:10px;
  background:#eee;
  gap:5px;
  align-items:center;
}

.chat-input input[type=text]{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}

.chat-input input[type=file]{
  display:none;
}

.chat-input button{
  min-width:50px;
  height:40px;
  border-radius:50%;
  background:#25D366;
  color:white;
  border:none;
  cursor:pointer;
  font-size:18px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.typing-indicator{
  font-size:12px;
  color:white;
}

/* Mobile adjustments */
@media (max-width:768px){
  .main-container{
    flex-direction:column;
    height:100vh;
  }
  .client-list{
    width:100%;
    max-height:200px;
    border-right:none;
    border-bottom:1px solid #e0e0e0;
  }
  .chat-container{
    flex:1;
  }
  #backToClients{
    display:inline-block;
  }
}
</style>
</head>
<body>

<div class="main-container">

  <div class="client-list">
    <div class="client-header" id="clientHeader">Loading...</div>
    <div id="clientList"></div>
  </div>

  <div class="chat-container">
    <div class="chat-header">
      <button id="backToClients" style="display:none;margin-right:10px;">← Clients</button>
      <span id="chatUser">Select Client</span>
      <span id="typingIndicator" class="typing-indicator"></span>
    </div>

    <div class="chat-messages" id="chatMessages"></div>
    <div id="filePreview" style="padding:5px;"></div>

    <div class="chat-input">
      <input type="text" id="messageInput" placeholder="Type a message...">
      <label for="fileInput" style="cursor:pointer;color:#128C7E;font-size:20px;">📎</label>
      <input type="file" id="fileInput">
      <button type="button" id="sendBtn">&#9658;</button>
    </div>
  </div>

</div>

<script>
const BASE_URL = "https://nyaysetu-backend-sme2.onrender.com";
let currentBookingId = null;
const chatMessages = document.getElementById("chatMessages");
const messageInput = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");
const fileInput = document.getElementById("fileInput");
const filePreview = document.getElementById("filePreview");
const typingIndicator = document.getElementById("typingIndicator");

const token = localStorage.getItem("userToken");
let sender = localStorage.getItem('advocateId') || localStorage.getItem('userId');
let senderType = localStorage.getItem('advocateId') ? "Advocate" : "User";

if(!token || !sender){
  alert("Session expired. Please login again.");
  window.location.href="login.html";
}

const clientHeader = document.getElementById("clientHeader");
if(senderType === "Advocate") clientHeader.innerText = "Approved Clients";
else clientHeader.innerText = "Your Advocates";

fileInput.addEventListener("change", () => {
  const file = fileInput.files[0];
  if(!file) return;

  if(file.type.startsWith("image/")){
    const reader = new FileReader();
    reader.onload = e => filePreview.innerHTML = `<img src="${e.target.result}" width="120" style="border-radius:8px;">`;
    reader.readAsDataURL(file);
  } else {
    filePreview.innerHTML = `<div style="background:white;padding:5px;border-radius:6px;">📄 ${file.name}</div>`;
  }
});

const backBtn = document.getElementById("backToClients");
backBtn.onclick = ()=> {
  document.querySelector(".client-list").style.display="flex";
  backBtn.style.display="none";
}

async function loadClients(){
  const list = document.getElementById("clientList");
  list.innerHTML = "";
  let addedClients = new Set();
  let approvedLocal = JSON.parse(localStorage.getItem("approvedClients")) || [];

  approvedLocal.forEach(client=>{
    if(addedClients.has(client.bookingId)) return;
    addedClients.add(client.bookingId);

    const div = document.createElement("div");
    div.className="client";
    div.innerHTML=`<span class="client-name">${client.name}</span>`;
    div.querySelector(".client-name").onclick=()=>{
      currentBookingId = client.bookingId;
      document.getElementById("chatUser").innerText=client.name;
      loadMessages();
      setTimeout(()=>chatMessages.scrollTop = chatMessages.scrollHeight,200);
      if(window.innerWidth <= 768){
        document.querySelector(".client-list").style.display="none";
        backBtn.style.display="inline-block";
      }
    }
    list.appendChild(div);
  });
}

async function loadMessages(){
  if(!currentBookingId) return;
  try{
    const res = await fetch(`${BASE_URL}/chat/${currentBookingId}`,{
      headers:{'Authorization':`Bearer ${token}`}
    });
    if(!res.ok) return;
    const data = await res.json();
    chatMessages.innerHTML="";
    if(!data.success || !Array.isArray(data.chats)) return;
    data.chats.forEach(msg=>{
      if(!msg||!msg.sender) return;
      const div = document.createElement("div");
      div.classList.add("message");
      div.classList.add(msg.sender._id===sender?"user":"advocate");

      let attachmentHTML="";
      if(msg.attachments){
        const fileUrl=`${BASE_URL}${msg.attachments}`;
        if(msg.attachments.match(/\.(jpg|jpeg|png|gif)$/i))
          attachmentHTML=`<br><img src="${fileUrl}" style="max-width:180px;border-radius:8px;margin-top:5px;cursor:pointer;" onclick="window.open('${fileUrl}')">`;
        else
          attachmentHTML=`<br><a href="${fileUrl}" target="_blank" style="display:inline-block;margin-top:5px;background:#f1f1f1;padding:6px 10px;border-radius:6px;text-decoration:none;color:black;">📎 Download File</a>`;
      }

      div.innerHTML=`<strong>${msg.sender?.name||"Advocate"}</strong><br>
      ${msg.message||""}${attachmentHTML}<span class="timestamp">${new Date(msg.createdAt).toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})}</span>
      <button class="delete-btn" onclick="deleteMessage('${msg._id}')">x</button>`;

      chatMessages.appendChild(div);
    });
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }catch(err){console.error(err);}
}

async function sendMessage(){
  if(!currentBookingId) return alert("Select a client first");
  const message=messageInput.value.trim();
  if(!message && !fileInput.files[0]) return;
  // For simplicity, skipping backend sending in this demo
  messageInput.value=""; fileInput.value=""; filePreview.innerHTML="";
  loadMessages();
}

sendBtn.onclick = sendMessage;
messageInput.addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); sendMessage();}});
messageInput.addEventListener('input', ()=>{ typingIndicator.innerText='Typing...'; setTimeout(()=>typingIndicator.innerText='',1000);});

loadClients();
</script>
</body>
</html>
